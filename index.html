<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADUWACORE Official Finance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { background-color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .input-clean { border: 1px solid #e2e8f0; border-radius: 12px; padding: 10px; font-size: 12px; width: 100%; outline: none; transition: 0.3s; }
        .input-clean:focus { border-color: #f43f5e; box-shadow: 0 0 0 3px rgba(244, 63, 94, 0.1); }
        #loadingOverlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.95); z-index: 999; flex-direction: column; align-items: center; justify-content: center; }
        .status-pill { padding: 4px 10px; border-radius: 99px; font-size: 9px; font-weight: 800; text-transform: uppercase; }
        .stats-card { background: white; border-radius: 24px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); text-align: center; }
    </style>
</head>
<body class="pb-20">

    <div id="loadingOverlay">
        <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-rose-600 mb-4"></div>
        <p class="font-bold text-slate-800 text-sm">Sedang Memproses Data...</p>
        <p class="text-[10px] text-slate-400 mt-2">Harap jangan tutup halaman ini</p>
    </div>

    <nav class="fixed top-0 w-full z-50 glass border-b px-6 py-4 flex justify-between items-center">
        <div class="font-black text-xl italic text-slate-800 uppercase tracking-tighter">
            ADUWA<span class="text-rose-600">CORE</span>
        </div>
        <div id="loginArea" class="flex gap-2">
            <input type="password" id="passInput" placeholder="Sandi" class="text-[10px] border rounded-lg px-3 py-1.5 w-24 outline-none">
            <button onclick="login()" class="bg-slate-900 text-white text-[10px] px-4 py-1.5 rounded-lg font-bold uppercase">Login</button>
        </div>
        <div id="logoutArea" class="hidden">
            <button onclick="logout()" class="bg-rose-50 text-rose-600 text-[10px] px-4 py-1.5 rounded-lg font-bold uppercase border border-rose-100">Logout Bendahara</button>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto pt-24 px-4">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="stats-card">
                <p class="text-[10px] font-bold text-slate-400 mb-1 uppercase">Total Masuk</p>
                <h2 id="totalIn" class="text-lg font-black text-emerald-600">Rp 0</h2>
            </div>
            <div class="stats-card border-b-4 border-rose-500">
                <p class="text-[10px] font-bold text-rose-400 mb-1 uppercase">Total Keluar</p>
                <h2 id="totalOut" class="text-lg font-black text-rose-600">Rp 0</h2>
            </div>
            <div class="stats-card md:col-span-2 bg-slate-900">
                <p class="text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-widest">Saldo Saat Ini</p>
                <h2 id="totalBal" class="text-2xl font-black text-white">Rp 0</h2>
            </div>
        </div>

        <section id="bendaharaSection" class="hidden grid md:grid-cols-2 gap-6 mb-12">
            <div class="bg-emerald-50/50 p-6 rounded-3xl border border-emerald-100 shadow-sm">
                <h3 class="font-black text-emerald-700 text-[11px] uppercase mb-4 italic tracking-wider">Tambah Pemasukan</h3>
                <input type="text" id="InKet" placeholder="Keterangan (Contoh: Kas April)" class="input-clean mb-3">
                <input type="number" id="InNom" placeholder="Nominal" class="input-clean mb-4" onblur="autoKilo(this)">
                <button onclick="saveTransaction('PEMASUKAN')" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl text-[11px] uppercase shadow-lg transition">Posting Pemasukan</button>
            </div>

            <div class="bg-rose-50/50 p-6 rounded-3xl border border-rose-100 shadow-sm">
                <h3 class="font-black text-rose-700 text-[11px] uppercase mb-4 italic tracking-wider">Tambah Pengeluaran</h3>
                <div class="flex gap-2 mb-3">
                    <input type="number" id="itemCount" placeholder="Jml Barang" class="input-clean w-24 text-center">
                    <button onclick="generateItemInputs()" class="bg-slate-800 text-white px-4 rounded-xl text-[10px] font-bold uppercase">Buat List</button>
                </div>
                <div id="itemInputsContainer" class="hidden space-y-3">
                    <div id="itemRows" class="space-y-2 max-h-48 overflow-y-auto pr-2"></div>
                    <div class="flex justify-between items-center py-2 border-t border-rose-100">
                        <span class="text-[10px] font-bold text-slate-400 uppercase">Estimasi Total:</span>
                        <span class="font-black text-rose-600 text-lg" id="liveTotal">Rp 0</span>
                    </div>
                    <input type="file" id="pengeluaranFoto" accept="image/*" class="w-full text-[10px] bg-white p-2 rounded-lg border border-rose-200">
                    <button onclick="saveTransaction('PENGELUARAN')" class="w-full bg-rose-600 hover:bg-rose-700 text-white font-bold py-3 rounded-xl text-[11px] uppercase shadow-lg transition">Posting Pengeluaran</button>
                </div>
            </div>
        </section>

        <div class="bg-white rounded-[32px] shadow-xl overflow-hidden border border-slate-100">
            <div class="p-6 bg-slate-900 text-white flex justify-between items-center">
                <div>
                    <h3 class="font-bold text-[12px] uppercase italic tracking-widest text-rose-500">Jurnal Transaksi</h3>
                    <p id="syncStatus" class="text-[8px] text-slate-400 uppercase mt-1">Mengambil data...</p>
                </div>
                <button onclick="loadData()" class="bg-white/10 hover:bg-white/20 p-2 rounded-lg transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-[12px]">
                    <thead class="bg-slate-50 border-b border-slate-100 text-slate-400 font-bold uppercase">
                        <tr>
                            <th class="p-5">Waktu</th>
                            <th>Keterangan</th>
                            <th class="text-right p-5">Nominal</th>
                        </tr>
                    </thead>
                    <tbody id="transactionList" class="divide-y divide-slate-50">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // MASUKKAN URL WEB APP GOOGLE SCRIPT KAMU DI SINI
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzOV_8vAjhdpC-rXw9qOA9pXSd6wbSFEl6G09zlpEKwBhwq13S6fIEXDP9uKyxBynHZWg/exec";
        const PASS_ADMIN = "12345678"; // Ganti sandi di sini
        let allTransactions = [];

        // 1. FUNGSI LOAD DATA (GET)
        async function loadData() {
            document.getElementById('syncStatus').innerText = "MENYINKRONKAN...";
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                
                // Mapping data dari Spreadsheet (A=Tgl, B=Ket, C=Tipe, D=Nom, E=Bukti)
                // Kita hilangkan header (data[0]) dan balik urutannya (reverse) agar yang terbaru di atas
                allTransactions = data.slice(1).map(row => ({
                    tgl: row[0],
                    ket: row[1],
                    tipe: row[2],
                    nom: row[3],
                    bukti: row[4]
                })).reverse();

                document.getElementById('syncStatus').innerText = "DATA TERBARU";
                render();
            } catch (e) {
                document.getElementById('syncStatus').innerText = "GAGAL SYNC";
                console.error(e);
            }
        }

        // 2. FUNGSI SIMPAN (POST - APPEND ONLY)
        async function saveTransaction(tipe) {
            const loader = document.getElementById('loadingOverlay');
            loader.style.display = 'flex';
            
            try {
                let ket = ""; let total = 0; let imgData = "#";
                const now = new Date();

                if(tipe === 'PEMASUKAN') {
                    ket = document.getElementById('InKet').value;
                    total = parseInt(document.getElementById('InNom').value);
                } else {
                    const names = document.getElementsByClassName('item-name');
                    const qtys = document.getElementsByClassName('item-qty');
                    const prices = document.getElementsByClassName('item-price');
                    let list = [];
                    for(let i=0; i<names.length; i++) {
                        if(names[i].value.trim() !== "") {
                            let sub = (parseFloat(qtys[i].value)||0) * (parseFloat(prices[i].value)||0);
                            list.push(`${names[i].value} (${qtys[i].value}x)`);
                            total += sub;
                        }
                    }
                    ket = list.join(", ");
                    const f = document.getElementById('pengeluaranFoto').files[0];
                    if(f) {
                        imgData = await new Promise(res => {
                            const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsDataURL(f);
                        });
                    }
                }

                if(!ket || total <= 0) { 
                    alert("Data tidak lengkap!"); 
                    loader.style.display = 'none'; 
                    return; 
                }

                const payload = {
                    tgl: now.toLocaleDateString('id-ID', {day:'2-digit', month:'short', year:'numeric'}),
                    ket: ket.toUpperCase(),
                    tipe: tipe,
                    nom: total,
                    bukti: imgData
                };

                // KIRIM DATA KE GOOGLE (Hanya 1 baris ini saja)
                await fetch(SCRIPT_URL, { 
                    method: "POST", 
                    body: JSON.stringify(payload), 
                    mode: 'no-cors' 
                });

                alert("Transaksi Berhasil Diposting!");
                
                // Tambah ke tampilan lokal secara instan
                allTransactions.unshift(payload);
                render();
                resetForm();

            } catch(e) {
                alert("Gagal menyimpan: " + e.message);
            } finally {
                loader.style.display = 'none';
            }
        }

        // 3. FUNGSI TAMPILAN (RENDER)
        function render() {
            const list = document.getElementById('transactionList');
            list.innerHTML = "";
            let tIn = 0, tOut = 0;

            allTransactions.forEach(t => {
                const isOut = t.tipe === 'PENGELUARAN';
                const nominal = Number(t.nom) || 0;
                if(isOut) tOut += nominal; else tIn += nominal;
                
                list.innerHTML += `<tr class="hover:bg-slate-50 transition">
                    <td class="p-5 text-slate-400 font-medium">${t.tgl}</td>
                    <td class="py-4">
                        <span class="block font-bold text-slate-800 uppercase tracking-tight">${t.ket}</span>
                        <div class="flex items-center gap-2 mt-1">
                            <span class="status-pill ${isOut?'bg-rose-100 text-rose-600':'bg-emerald-100 text-emerald-600'}">${t.tipe}</span>
                            ${t.bukti && t.bukti !== '#' ? `<button onclick="viewNota('${t.bukti}')" class="text-[9px] font-bold text-blue-500 underline uppercase">Lihat Nota</button>` : ''}
                        </div>
                    </td>
                    <td class="text-right p-5 font-black ${isOut?'text-rose-600':'text-emerald-600'} text-sm">
                        ${isOut?'-':'+'} Rp ${nominal.toLocaleString()}
                    </td>
                </tr>`;
            });

            document.getElementById('totalIn').innerText = `Rp ${tIn.toLocaleString()}`;
            document.getElementById('totalOut').innerText = `Rp ${tOut.toLocaleString()}`;
            document.getElementById('totalBal').innerText = `Rp ${(tIn - tOut).toLocaleString()}`;
        }

        // HELPER FUNCTIONS
        function viewNota(base64) {
            const win = window.open();
            win.document.write(`<img src="${base64}" style="max-width:100%">`);
        }

        function autoKilo(el) { 
            if(el.value > 0 && el.value < 1000) el.value = el.value * 1000; 
            calcTotal(); 
        }
        
        function generateItemInputs() {
            const c = document.getElementById('itemCount').value || 1;
            const row = document.getElementById('itemRows'); row.innerHTML = "";
            for(let i=0; i<c; i++) {
                row.innerHTML += `<div class="grid grid-cols-5 gap-2 animate-small-in">
                    <input type="text" class="input-clean item-name col-span-2" placeholder="Nama Barang">
                    <input type="number" class="input-clean item-qty text-center" value="1" oninput="calcTotal()">
                    <input type="number" class="input-clean item-price col-span-2" placeholder="Harga" oninput="calcTotal()" onblur="autoKilo(this)">
                </div>`;
            }
            document.getElementById('itemInputsContainer').classList.remove('hidden');
        }

        function calcTotal() {
            let t = 0;
            const q = document.getElementsByClassName('item-qty');
            const p = document.getElementsByClassName('item-price');
            for(let i=0; i<q.length; i++) t += (Number(q[i].value)||0) * (Number(p[i].value)||0);
            document.getElementById('liveTotal').innerText = `Rp ${t.toLocaleString()}`;
        }

        function resetForm() {
            document.getElementById('InKet').value = ""; document.getElementById('InNom').value = "";
            document.getElementById('itemRows').innerHTML = "";
            document.getElementById('itemInputsContainer').classList.add('hidden');
            document.getElementById('itemCount').value = "";
        }

        function login() {
            if(document.getElementById('passInput').value === PASS_ADMIN) {
                document.getElementById('bendaharaSection').classList.remove('hidden');
                document.getElementById('loginArea').classList.add('hidden');
                document.getElementById('logoutArea').classList.remove('hidden');
                localStorage.setItem("admin_aduwa", "true");
            } else { alert("Sandi Bendahara Salah!"); }
        }

        function logout() { localStorage.removeItem("admin_aduwa"); location.reload(); }

        window.onload = () => {
            if(localStorage.getItem("admin_aduwa") === "true") {
                document.getElementById('bendaharaSection').classList.remove('hidden');
                document.getElementById('loginArea').classList.add('hidden');
                document.getElementById('logoutArea').classList.remove('hidden');
            }
            loadData();
        }
    </script>
</body>
</html>
