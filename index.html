<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADUWACORE Official Finance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .sticky-name { position: sticky; left: 0; background: #ffffff; z-index: 20; border-right: 3px solid #f43f5e; font-weight: 700; min-width: 180px; padding-left: 20px !important; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .input-clean { border: 1px solid #e2e8f0; border-radius: 12px; padding: 10px; font-size: 11px; outline: none; transition: 0.3s; width: 100%; }
        .input-clean:focus { border-color: #f43f5e; box-shadow: 0 0 0 2px rgba(244, 63, 94, 0.1); }
        #loadingOverlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 999; flex-direction: column; align-items: center; justify-content: center; }
        .status-pill { padding: 4px 10px; border-radius: 99px; font-size: 8px; text-transform: uppercase; font-weight: 800; }
    </style>
</head>
<body class="pb-24">

    <div id="loadingOverlay">
        <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-rose-600 mb-4"></div>
        <p class="font-bold text-slate-800 text-sm">Sedang Memproses...</p>
    </div>

    <nav class="fixed top-0 w-full z-50 glass border-b px-6 py-4 flex justify-between items-center">
        <div class="font-black text-xl italic uppercase text-slate-800">ADUWA<span class="text-rose-600">CORE</span></div>
        <div id="loginArea" class="flex gap-2">
            <input type="password" id="passInput" placeholder="Sandi" class="text-[10px] border rounded-lg px-3 py-2 w-24">
            <button onclick="login()" class="bg-slate-900 text-white text-[10px] px-4 py-2 rounded-lg font-bold uppercase">Login</button>
        </div>
        <div id="logoutArea" class="hidden">
            <button onclick="logout()" class="bg-rose-100 text-rose-600 text-[10px] px-4 py-2 rounded-lg font-bold">LOGOUT</button>
        </div>
    </nav>

    <div class="w-full pt-24 px-4 max-w-7xl mx-auto">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white p-6 rounded-3xl shadow-sm text-center border-b-4 border-emerald-500">
                <p class="text-[9px] font-bold text-slate-400 mb-1 uppercase">Kas Masuk</p>
                <h2 class="text-base font-black" id="totalIn">Rp 0</h2>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow-sm text-center border-b-4 border-rose-500">
                <p class="text-[9px] font-bold text-rose-500 mb-1 uppercase">Keluar</p>
                <h2 class="text-base font-black text-rose-600" id="totalOut">Rp 0</h2>
            </div>
            <div class="bg-slate-900 p-6 rounded-3xl shadow-sm text-center md:col-span-2">
                <p class="text-[9px] font-bold text-slate-400 mb-1 uppercase">Saldo Akhir</p>
                <h2 class="text-xl font-black text-white" id="totalBal">Rp 0</h2>
            </div>
        </div>

        <section id="bendaharaSection" class="hidden grid md:grid-cols-2 gap-6 mb-12">
            <div class="bg-blue-50/50 p-6 rounded-3xl border border-blue-100">
                <h4 class="font-black text-blue-700 text-[10px] uppercase mb-4 italic text-center">Pemasukan Baru</h4>
                <input type="text" id="InKet" placeholder="Keterangan" class="input-clean mb-3">
                <input type="number" id="InNom" placeholder="Nominal" class="input-clean mb-4" onblur="autoKilo(this)">
                <button onclick="saveTransaction('PEMASUKAN')" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl text-[10px] uppercase">Posting</button>
            </div>
            <div class="bg-rose-50/50 p-6 rounded-3xl border border-rose-100">
                <h4 class="font-black text-rose-700 text-[10px] uppercase mb-4 italic text-center">Pengeluaran Baru</h4>
                <div class="flex gap-2 mb-3">
                    <input type="number" id="itemCount" placeholder="Jml" class="input-clean w-16">
                    <button onclick="generateItemInputs()" class="bg-slate-800 text-white px-3 rounded-xl text-[10px] font-bold">BUAT LIST</button>
                </div>
                <div id="itemInputsContainer" class="hidden space-y-3">
                    <div id="itemRows" class="space-y-2 max-h-40 overflow-y-auto"></div>
                    <div class="text-right font-black text-rose-600 text-lg" id="liveTotal">Rp 0</div>
                    <input type="file" id="pengeluaranFoto" accept="image/*" class="w-full text-[10px] bg-white p-2 rounded-lg border">
                    <button onclick="saveTransaction('PENGELUARAN')" class="w-full bg-rose-600 text-white font-bold py-3 rounded-xl text-[10px] uppercase">Posting</button>
                </div>
            </div>
        </section>

        <div class="bg-white rounded-[32px] shadow-xl overflow-hidden mb-10 border border-slate-100">
            <div class="p-5 border-b flex justify-between items-center bg-slate-50/30">
                <h3 class="font-bold text-[11px] uppercase italic">Monitoring Kas Mahasiswa</h3>
                <span id="syncStatus" class="text-[8px] font-bold text-slate-400 uppercase tracking-widest">Live Sync</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-[11px]">
                    <thead class="bg-slate-50 text-slate-400 font-bold uppercase">
                        <tr><th class="p-4 sticky-name">Nama Mahasiswa</th><th class="px-2">APR</th><th class="px-2">MEI</th><th class="px-2">JUN</th><th class="px-2">JUL</th><th class="px-2">AGU</th><th class="px-2">SEP</th><th class="px-2">OKT</th><th class="px-2">NOV</th><th class="px-2">DES</th></tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-50">
                        </tbody>
                </table>
            </div>
        </div>

        <div class="bg-white rounded-[32px] shadow-xl overflow-hidden border border-slate-100">
            <div class="p-5 bg-slate-900 text-white flex justify-between items-center">
                <h3 class="font-bold text-[11px] uppercase italic tracking-widest text-emerald-400">Jurnal Transaksi</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-[11px]">
                    <thead class="bg-slate-50 text-slate-400 font-bold border-b">
                        <tr><th class="p-4">Tanggal</th><th>Keterangan</th><th>Tipe</th><th class="text-right">Nominal</th><th class="text-center">Nota</th></tr>
                    </thead>
                    <tbody id="transactionList" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzOV_8vAjhdpC-rXw9qOA9pXSd6wbSFEl6G09zlpEKwBhwq13S6fIEXDP9uKyxBynHZWg/exec";
        const PASS_ADMIN = "12345678"; 
        const bulan = ["Apr", "Mei", "Jun", "Jul", "Agu", "Sep", "Okt", "Nov", "Des"];
        
        let isEditMode = false;
        let dataKas = {}; // Contoh: {"NAMA": {"Apr": true}}
        let allTransactions = [];

        // LOAD DATA AWAL
        async function loadData() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                
                // Pisahkan data transaksi (Jurnal)
                allTransactions = data.slice(1).map(row => ({
                    tgl: row[0], ket: row[1], tipe: row[2], nom: row[3], bukti: row[4]
                })).reverse();
                
                render();
            } catch (e) { console.error("Error loading data", e); }
        }

        // RENDER TAMPILAN
        function render() {
            const list = document.getElementById('transactionList');
            list.innerHTML = "";
            let tIn = 0, tOut = 0;

            allTransactions.forEach(t => {
                const nom = Number(t.nom) || 0;
                if(t.tipe === 'PEMASUKAN') tIn += nom; else tOut += nom;
                
                list.innerHTML += `<tr>
                    <td class="p-4 text-slate-400 font-bold">${t.tgl}</td>
                    <td class="font-bold uppercase">${t.ket}</td>
                    <td><span class="status-pill ${t.tipe==='PEMASUKAN'?'bg-emerald-100 text-emerald-600':'bg-rose-100 text-rose-600'}">${t.tipe}</span></td>
                    <td class="text-right font-black">Rp ${nom.toLocaleString()}</td>
                    <td class="text-center">${t.bukti!=='#'?`<button onclick="window.open().document.write('<img src=${t.bukti}>')" class="text-blue-500 underline">Lihat</button>`:'-'}</td>
                </tr>`;
            });

            // Tampilkan Checklist Nama (Manual/Statistis atau dari sheet lain jika ada)
            // Di sini saya buatkan contoh 2 nama sesuai sebelumnya
            const mhs = ["MAULANA YUSRIL FAWAIZ", "MARSYA UKHROWINA AKHYARI"];
            const tb = document.getElementById('tableBody'); tb.innerHTML = "";
            mhs.forEach(n => {
                let r = `<tr class="border-b"><td class="p-4 sticky-name text-[9px]">${n}</td>`;
                bulan.forEach(bl => {
                    r += `<td class="text-center"><input type="checkbox" disabled></td>`;
                });
                tb.innerHTML += r + "</tr>";
            });

            document.getElementById('totalIn').innerText = `Rp ${tIn.toLocaleString()}`;
            document.getElementById('totalOut').innerText = `Rp ${tOut.toLocaleString()}`;
            document.getElementById('totalBal').innerText = `Rp ${(tIn - tOut).toLocaleString()}`;
        }

        async function saveTransaction(tipe) {
            document.getElementById('loadingOverlay').style.display = 'flex';
            try {
                let ket = ""; let total = 0; let imgData = "#";
                if(tipe === 'PEMASUKAN') {
                    ket = document.getElementById('InKet').value;
                    total = parseInt(document.getElementById('InNom').value);
                } else {
                    const names = document.getElementsByClassName('item-name');
                    const qtys = document.getElementsByClassName('item-qty');
                    const prices = document.getElementsByClassName('item-price');
                    let list = [];
                    for(let i=0; i<names.length; i++) {
                        if(names[i].value.trim() !== "") {
                            let sub = (Number(qtys[i].value)||0) * (Number(prices[i].value)||0);
                            list.push(`${names[i].value} (${qtys[i].value}x)`);
                            total += sub;
                        }
                    }
                    ket = list.join(", ");
                    const f = document.getElementById('pengeluaranFoto').files[0];
                    if(f) {
                        imgData = await new Promise(res => {
                            const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsDataURL(f);
                        });
                    }
                }

                const payload = {
                    tgl: new Date().toLocaleDateString('id-ID'),
                    ket: ket.toUpperCase(),
                    tipe: tipe,
                    nom: total,
                    bukti: imgData
                };

                await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload), mode: 'no-cors' });
                
                alert("Sukses!");
                location.reload(); 
            } catch(e) { alert("Gagal!"); }
            document.getElementById('loadingOverlay').style.display = 'none';
        }

        // FUNGSI PENDUKUNG
        function login() {
            if(document.getElementById('passInput').value === PASS_ADMIN) {
                document.getElementById('bendaharaSection').classList.remove('hidden');
                document.getElementById('loginArea').classList.add('hidden');
                document.getElementById('logoutArea').classList.remove('hidden');
                localStorage.setItem("admin_aduwa", "true");
            }
        }
        function logout() { localStorage.removeItem("admin_aduwa"); location.reload(); }
        function autoKilo(el) { if(el.value > 0 && el.value < 1000) el.value = el.value * 1000; calcTotal(); }
        function generateItemInputs() {
            const c = document.getElementById('itemCount').value || 1;
            const row = document.getElementById('itemRows'); row.innerHTML = "";
            for(let i=0; i<c; i++) {
                row.innerHTML += `<div class="grid grid-cols-5 gap-2 mb-2">
                    <input type="text" class="input-clean item-name col-span-2" placeholder="Barang">
                    <input type="number" class="input-clean item-qty text-center" value="1" oninput="calcTotal()">
                    <input type="number" class="input-clean item-price col-span-2" placeholder="Harga" oninput="calcTotal()" onblur="autoKilo(this)">
                </div>`;
            }
            document.getElementById('itemInputsContainer').classList.remove('hidden');
        }
        function calcTotal() {
            let t = 0;
            const q = document.getElementsByClassName('item-qty');
            const p = document.getElementsByClassName('item-price');
            for(let i=0; i<q.length; i++) t += (Number(q[i].value)||0) * (Number(p[i].value)||0);
            document.getElementById('liveTotal').innerText = `Rp ${t.toLocaleString()}`;
        }

        window.onload = () => {
            if(localStorage.getItem("admin_aduwa") === "true") login();
            loadData();
        }
    </script>
</body>
</html>
